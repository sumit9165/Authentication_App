{% extends "account/base.html" %}
{% block title %}Password Reset Confirm{% endblock title %}

{% block content %}

<div class="flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md p-8 space-y-6 bg-gray-800 rounded-lg shadow-md">
        <h2 class="text-2xl text-center font-bold">Set New Password</h2>
        <form method="POST" action="#" class="space-y-6">
        {% csrf_token %}
        <!--New Password field-->
            <div>
                <label for="new_password1" class="block text-sm font-medium">New Password</label>
                <input type="password" name="new_password1" id="new_password1" class="block w-full mt-1 border-gray-300 rounded-md shadow-sm bg-gray-700 text-gray-200 p-2" placeholder="*********" required>
            </div>
        <!-- Confirm New Password field-->
            <div>
                <label for="new_password2" class="block text-sm font-medium">Confirm Password</label>
                <input type="password" name="new_password2" id="new_password2" class="block w-full mt-1 border-gray-300 rounded-md shadow-sm bg-gray-700 text-gray-200 p-2" placeholder="*********" required>
            </div>

        <!-- Login Button -->
            <button type="submit" class=" w-full px-4 py-2 text-white bg-rose-500 rounded-md hover:bg-rose-600">Set Password</button>
        </form>
    </div>
</div>

{% endblock content %}
