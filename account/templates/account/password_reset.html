{% extends "account/base.html" %}
{% block title %}Reset Password{% endblock title %}

{% block content %}
<div class="flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md p-8 space-y-6 bg-gray-800 rounded-lg shadow-md">
        <h2 class="text-2xl text-center font-bold">Login to Your account</h2>
        <form method="POSt" action="#" class="space-y-6" id="password-reset-form">
        {% csrf_token %}
        <!-- Email field-->
            <div>
                <label for="email" class="block text-sm font-medium">Email</label>
                <input type="email" value="{{form.email.value|default:""}}" name="email" id="email" class="block w-full mt-1 border-gray-300 rounded-md shadow-sm bg-gray-700 p-2" placeholder="your@email.com" required>
                {% if form.email.errors %}
                <div class="text-red-500 text-sm mt-1">
                    {% for error in form.email.errors %}
                        <p>{{error}}</p>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
        <!-- Login Button -->
            <button type="submit" class=" w-full px-4 py-2 text-white bg-rose-500 rounded-md hover:bg-rose-600 focus:outline-none">Send Password Reset Link</button>
        </form>
    </div>
</div>

<script>
    // Get references to the form and the submit button
    const form = document.getElementById('reset-password-form');
    const submitBtn = document.getElementById('submit-btn');

    //Add event listener for form submission
    form.addEventListener('submit', function(event) {
        // Disable the button when the form is submitted
        submitBtn.disabled = true;
        submitBtn.innerText = 'Sending...';     // Optional: Change button text to indicate action
        
        // Optionally, handle form submission with AJAx to avoid page reload
        // If using standard form submission. no need to do anything here as the form will send the request. 
    });
</script>

{% endblock content %}
