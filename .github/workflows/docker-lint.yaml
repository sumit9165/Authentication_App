name: Docker Lint

on:
    push:
        branches:
            - main
    workflow_call:

jobs:
    docker-lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Docker
              uses: docker/setup-buildx-action@v2

            - name: Lint Dockerfile
              uses: hadolint/hadolint-action@v3.1.0
              with:
                 dockerfile: Dockerfile

            