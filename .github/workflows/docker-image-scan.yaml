name: Docker Image Scan

on:
    push:
        branches:
            - main
    workflow_call:

jobs: 
    docker-image-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Log in to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: Build image
              run: |
                docker build --pull --no-cache \
                  -t authentication_app:latest .

            - name: Scan image
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                image-ref: authentication_app:latest
                severity: CRITICAL,HIGH
                ignore-unfixed: true
                exit-code: 1

            - name: Tag image
              run: |
                docker tag authentication_app:latest \
                  ${{ secrets.DOCKER_USERNAME }}/authentication_app:latest

            - name: Push image
              run: |
                docker push \
                  ${{ secrets.DOCKER_USERNAME }}/authentication_app:latest

